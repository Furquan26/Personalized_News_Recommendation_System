version: '3.8'

services:
  news-app:
    build: .
    container_name: news-recommendation-app
    ports:
      - "8501:8501"
    volumes:
      - ./news_recommendation.db:/app/news_recommendation.db
      - ./.env:/app/.env
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_LOGGER_LEVEL=info
    restart: unless-stopped
    networks:
      - news-network

networks:
  news-network:
    driver: bridge
